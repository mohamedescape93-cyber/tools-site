<h1>Word & Character Counter</h1>
<textarea id="text" rows="10" cols="60" placeholder="Paste or type your text here..."></textarea>

<br><br>

<button onclick="countWords()">Count Words & Character</button>

<h3 id="result"></h3>

<script>

function countWords(){

let text=document.getElementById("text").value.trim();

if(text===""){
document.getElementById("result").innerHTML="Words: 0 | Characters: 0";
return;
}

let words=text.split(/\s+/).length;
let characters=text.length;

document.getElementById("result").innerHTML="Words: "+words+" | Characters: "+characters;

}

</script>
