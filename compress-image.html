<!DOCTYPE html>
<html>

<head>

<title>Compress Image Online - FastTools</title>

<meta name="description" content="Compress JPG, PNG and WEBP images online for free. Reduce image file size instantly.">

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="site-header">
<a href="index.html" class="logo">FastTools</a>
</header>

<div class="back-container">
<a href="index.html" class="back-link">← Back to FastTools</a>
</div>
<div class="tool-container">

<h1>Image Compressor</h1>

<p>Upload an image and reduce its file size instantly.</p>

<div class="upload-box">

<input type="file" id="upload" accept="image/*">

</div>

<div class="quality-control">

<label>Compression Quality</label>

<input type="range" id="quality" min="0.1" max="1" step="0.1" value="0.8">

<span id="qualityValue">0.8</span>

</div>

<button class="main-button" onclick="compressImage()">
Compress Image
</button>

<img id="preview">

<a id="downloadLink" class="main-button" style="display:none"></a>
</div>

<script>

const upload = document.getElementById("upload");
const preview = document.getElementById("preview");
const qualitySlider = document.getElementById("quality");
const qualityValue = document.getElementById("qualityValue");
const downloadLink = document.getElementById("downloadLink");

let imageFile = null;

qualitySlider.oninput = function(){
qualityValue.innerText = qualitySlider.value;
};

upload.onchange = function(e){

imageFile = e.target.files[0];

const reader = new FileReader();

reader.onload = function(event){
preview.src = event.target.result;
};

reader.readAsDataURL(imageFile);

};

function compressImage(){

if(!imageFile){
alert("Please upload an image first");
return;
}

const img = new Image();
img.src = preview.src;

img.onload = function(){

const canvas = document.createElement("canvas");
const ctx = canvas.getContext("2d");

const maxWidth = 1200;

if(img.width > maxWidth){
canvas.width = maxWidth;
canvas.height = img.height * (maxWidth / img.width);
}else{
canvas.width = img.width;
canvas.height = img.height;
}

ctx.drawImage(img,0,0,canvas.width,canvas.height);

canvas.toBlob(function(blob){

const url = URL.createObjectURL(blob);

downloadLink.href = url;
downloadLink.download = "compressed-" + imageFile.name;
downloadLink.innerText = "Download Image";
downloadLink.style.display = "block";

},"image/jpeg", qualitySlider.value);

};

}

</script>

</body>

</html>
