<!DOCTYPE html>
<html>

<head>

<title>Link Shortener - FastTools</title>

<link rel="stylesheet" href="style.css">

<style>

.result-box{
display:flex;
gap:10px;
margin-top:15px;
justify-content:center;
}

#result{
flex:1;
}

#copyBtn{
padding:12px 16px;
cursor:pointer;
background:#2c3e50;
color:white;
border:none;
border-radius:6px;
}

#copyBtn:hover{
background:#1f2f3d;
}

#toast{
visibility:hidden;
min-width:200px;
background:#333;
color:#fff;
text-align:center;
border-radius:6px;
padding:12px;
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
z-index:999;
}

#toast.show{
visibility:visible;
animation:fadein 0.3s, fadeout 0.3s 2.5s;
}

@keyframes fadein{
from{bottom:10px;opacity:0;}
to{bottom:30px;opacity:1;}
}

@keyframes fadeout{
from{bottom:30px;opacity:1;}
to{bottom:10px;opacity:0;}
}

</style>

</head>

<body>


<header class="site-header">
<a href="index.html" class="logo">FastTools</a>
</header>


<div class="back-bar">
<a href="index.html" class="back-link">← Back to FastTools</a>
</div>

<div class="tool-container">

<h1>Link Shortener</h1>

<input type="text" id="url" placeholder="Paste your long URL here">

<button id="shortenBtn" onclick="shorten()">Shorten Link</button>

<div class="result-box">

<input type="text" id="result" readonly placeholder="Short link will appear here">

<button id="copyBtn" onclick="copyLink()">Copy</button>

</div>

</div>


<footer class="site-footer">
<p>
© 2026 FastTools • Free Online Tools
<br>
<a href="privacy.html">Privacy</a> •
<a href="terms.html">Terms</a> •
<a href="contact.html">Contact</a>
</p>
</footer>


<div id="toast">Link copied!</div>


<script>

async function shorten(){

let url=document.getElementById("url").value.trim();
let button=document.getElementById("shortenBtn");
let result=document.getElementById("result");

/* Fix missing protocol */

if(!url.startsWith("http://") && !url.startsWith("https://")){
url="https://" + url;
}

/* Basic validation */

try{
new URL(url);
}catch{
alert("Please enter a valid URL");
return;
}

/* Loading state */

button.innerText="Shortening...";
button.disabled=true;

try{

let response=await fetch("https://tinyurl.com/api-create.php?url=" + encodeURIComponent(url));

let shortUrl=await response.text();

result.value=shortUrl;

}catch(error){

alert("Error shortening link. Try again.");

}

button.innerText="Shorten Link";
button.disabled=false;

}

function copyLink(){

let result=document.getElementById("result");

if(!result.value){
return;
}

result.select();
result.setSelectionRange(0,99999);

navigator.clipboard.writeText(result.value);

showToast();

}


function showToast(){

let toast=document.getElementById("toast");

toast.className="show";

setTimeout(()=>{
toast.className=toast.className.replace("show","");
},3000);

}

</script>

</body>

</html>
