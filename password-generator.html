<!DOCTYPE html>
<html>

<head>

<title>Password Generator - FastTools</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="site-header">
<a href="index.html" class="logo">FastTools</a>
</header>

<div class="back-bar">
<a href="index.html" class="back-link">← Back to FastTools</a>
</div>

<div class="tool-container">

<h1>Password Generator</h1>

<label>Password Length</label>

<input type="number" id="length" value="12" min="4" max="50">

<button onclick="generatePassword()">Generate Password</button>

<input type="text" id="password" readonly placeholder="Generated password will appear here">

</div>


<footer class="site-footer">
<p>

</p>
</footer>

<script>

function generatePassword(){

const length = document.getElementById("length").value;

const characters = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()";

let password = "";

for(let i = 0; i < length; i++){

password += characters.charAt(Math.floor(Math.random() * characters.length));

}

document.getElementById("password").value = password;

}

</script>

</body>

</html>
