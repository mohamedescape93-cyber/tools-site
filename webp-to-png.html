  {
font-family:Arial;
background:#f4f6f9;
text-align:center;
}

#drop-area{
border:2px dashed #2c3e50;
padding:40px;
width:60%;
margin:auto;
background:white;
cursor:pointer;
}

#preview img{
width:100px;
margin:10px;
}

button{
padding:10px 20px;
margin-top:20px;
}

</style>

</head>

<body>

<h1>PNG to JPG Converter</h1>

<p>Upload PNG images and convert them to JPG instantly.</p>

<div id="drop-area">
<p>Drag & Drop Images Here or Click to Upload</p>
<input type="file" id="upload" multiple accept="image/*" hidden>
</div>

<div id="preview"></div>

<br>

<button onclick="convert()">Convert to JPG</button>

<br><br>

<div id="downloads"></div>

<script>

let dropArea=document.getElementById("drop-area");
let fileInput=document.getElementById("upload");
let preview=document.getElementById("preview");

dropArea.onclick=()=>fileInput.click();

dropArea.addEventListener("dragover",e=>{
e.preventDefault();
});

dropArea.addEventListener("drop",e=>{
e.preventDefault();
fileInput.files=e.dataTransfer.files;
showPreview();
});

fileInput.addEventListener("change",showPreview);

function showPreview(){

preview.innerHTML="";

let files=fileInput.files;

for(let i=0;i<files.length;i++){

let img=document.createElement("img");
img.src=URL.createObjectURL(files[i]);
preview.appendChild(img);

}

}

function convert(){

let files=fileInput.files;

let downloads=document.getElementById("downloads");
downloads.innerHTML="";

for(let i=0;i<files.length;i++){

let file=files[i];

let img=new Image();
let reader=new FileReader();

reader.onload=function(e){

img.src=e.target.result;

img.onload=function(){

let canvas=document.createElement("canvas");
canvas.width=img.width;
canvas.height=img.height;

let ctx=canvas.getContext("2d");
ctx.drawImage(img,0,0);

let jpg=canvas.toDataURL("image/png");

let link=document.createElement("a");

link.href=jpg;
link.download="converted_"+(i+1)+".jpg";
link.innerHTML="Download Image "+(i+1);

downloads.appendChild(link);
downloads.appendChild(document.createElement("br"));

}

}

reader.readAsDataURL(file);

}

}

</script>

</body>
</html>
