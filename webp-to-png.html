<!DOCTYPE html>
<html>

<head>

<title>PNG to JPG Converter - FastTools</title>

<link rel="stylesheet" href="style.css">

<meta name="description" content="Convert PNG images to JPG online for free using FastTools.">

<style>

#drop-area{
border:2px dashed #2c3e50;
padding:40px;
max-width:600px;
margin:20px auto;
background:white;
cursor:pointer;
border-radius:8px;
}

#preview img{
width:100px;
margin:10px;
border-radius:6px;
}

#preview{
margin-top:15px;
}

#downloads a{
display:block;
margin:10px;
}

</style>

</head>

<body>

<header class="site-header">
<a href="index.html" class="logo">FastTools</a>
</header>

<div class="back-bar">
<a href="index.html" class="back-link">← Back to FastTools</a>
</div>

<div class="tool-container">

<h1>PNG to JPG Converter</h1>

<p>Upload PNG images and convert them to JPG instantly.</p>

<div id="drop-area">
<p>Drag & Drop Images Here or Click to Upload</p>
<input type="file" id="upload" multiple accept="image/png" hidden>
</div>

<div id="preview"></div>

<button onclick="convert()">Convert to JPG</button>

<div id="downloads"></div>

</div>


<footer class="site-footer">
<p>
© 2026 FastTools • Free Online Tools
<br>
<a href="privacy.html">Privacy</a> •
<a href="terms.html">Terms</a> •
<a href="contact.html">Contact</a>
</p>
</footer>


<script>

let dropArea=document.getElementById("drop-area");
let fileInput=document.getElementById("upload");
let preview=document.getElementById("preview");

dropArea.onclick=()=>fileInput.click();

dropArea.addEventListener("dragover",e=>{
e.preventDefault();
});

dropArea.addEventListener("drop",e=>{
e.preventDefault();
fileInput.files=e.dataTransfer.files;
showPreview();
});

fileInput.addEventListener("change",showPreview);

function showPreview(){

preview.innerHTML="";

let files=fileInput.files;

for(let i=0;i<files.length;i++){

let img=document.createElement("img");
img.src=URL.createObjectURL(files[i]);
preview.appendChild(img);

}

}

function convert(){

let files=fileInput.files;

let downloads=document.getElementById("downloads");
downloads.innerHTML="";

for(let i=0;i<files.length;i++){

let file=files[i];

let img=new Image();
let reader=new FileReader();

reader.onload=function(e){

img.src=e.target.result;

img.onload=function(){

let canvas=document.createElement("canvas");
canvas.width=img.width;
canvas.height=img.height;

let ctx=canvas.getContext("2d");
ctx.drawImage(img,0,0);

let jpg=canvas.toDataURL("image/jpeg");

let link=document.createElement("a");

link.href=jpg;
link.download="converted_"+(i+1)+".jpg";
link.innerHTML="Download Image "+(i+1);

downloads.appendChild(link);

}

}

reader.readAsDataURL(file);

}

}

</script>

</body>
</html>
