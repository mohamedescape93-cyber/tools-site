<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Meme Generator - FastTools</title>

<link rel="stylesheet" href="style.css">
<link rel="icon" type="image/svg+xml" href="favicon.svg">

<style>

.editor{
max-width:1000px;
margin:auto;
margin-top:40px;
display:grid;
grid-template-columns:1fr 320px;
gap:30px;
}

.canvas-container{
text-align:center;
}

#memeCanvas{
max-width:100%;
background:#000;
border-radius:10px;
}

.controls{
display:flex;
flex-direction:column;
gap:15px;
}

.controls input{
padding:10px;
border-radius:6px;
border:1px solid #cbd5e1;
}

.controls button{
padding:12px;
border:none;
background:#2563eb;
color:white;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<header class="site-header">

<a href="index.html" class="logo">
<img src="fasttools-logo.png.png" alt="FastTools">
</a>

<nav class="nav-menu">
<a href="index.html">Home</a>
<a href="index.html#tools">Tools</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
</nav>

</header>


<div class="tool-container">

<h1>Meme Generator</h1>
<p>Create memes with draggable text.</p>

<input type="file" id="upload" accept="image/*">

</div>


<div class="editor">

<div class="canvas-container">
<canvas id="memeCanvas"></canvas>
</div>

<div class="controls">

<input type="text" id="topText" placeholder="Top text">

<input type="text" id="bottomText" placeholder="Bottom text">

<label>Font Size</label>
<input type="range" id="fontSize" min="20" max="80" value="40">

<label>Text Color</label>
<input type="color" id="textColor" value="#ffffff">

<label>Outline Width</label>
<input type="range" id="strokeWidth" min="1" max="10" value="4">

<button onclick="downloadMeme()">Download Meme</button>

</div>

</div>


<footer class="site-footer">

<p>
© 2026 FastTools
<br>
<a href="privacy.html">Privacy</a> •
<a href="terms.html">Terms</a> •
<a href="contact.html">Contact</a>
</p>

</footer>


<script>

window.onload = function(){

const canvas = document.getElementById("memeCanvas");
const ctx = canvas.getContext("2d");

let img = new Image();

document.getElementById("upload").addEventListener("change", function(){

const file = this.files[0];
if(!file) return;

const reader = new FileReader();

reader.onload = function(e){
img.src = e.target.result;
};

reader.readAsDataURL(file);

});


img.onload = function(){

const maxWidth = 800;

let scale = Math.min(maxWidth / img.width,1);

canvas.width = img.width * scale;
canvas.height = img.height * scale;

draw();

};


document.querySelectorAll(".controls input").forEach(el=>{
el.addEventListener("input",draw);
});


function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.drawImage(img,0,0,canvas.width,canvas.height);

const topText = document.getElementById("topText").value;
const bottomText = document.getElementById("bottomText").value;

const fontSize = document.getElementById("fontSize").value;
const color = document.getElementById("textColor").value;
const strokeWidth = document.getElementById("strokeWidth").value;

ctx.font = `bold ${fontSize}px Impact`;
ctx.fillStyle = color;
ctx.strokeStyle = "black";
ctx.lineWidth = strokeWidth;
ctx.textAlign = "center";

ctx.fillText(topText,canvas.width/2,60);
ctx.strokeText(topText,canvas.width/2,60);

ctx.fillText(bottomText,canvas.width/2,canvas.height-30);
ctx.strokeText(bottomText,canvas.width/2,canvas.height-30);

}


window.downloadMeme = function(){

const link = document.createElement("a");

link.download = "meme.png";
link.href = canvas.toDataURL("image/png");

link.click();

};

};

</script>

</body>
</html>
