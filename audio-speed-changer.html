<div class="tool-box">

<h2>MP3 Cutter</h2>

<input type="file" id="audioFile">

<div id="waveform"></div>

<div class="controls">

Start <input id="startTime" type="number" value="0">

End <input id="endTime" type="number">

<button onclick="exportTrim()">Export</button>

</div>

</div>

<script>

let wavesurfer

wavesurfer = WaveSurfer.create({
container: '#waveform',
waveColor: '#6c8fff',
progressColor: '#3a78ff',
height:120,
plugins: [
WaveSurfer.regions.create({})
]
})

document.getElementById("audioFile").addEventListener("change", function(e){

const file = e.target.files[0]

if(!file) return

const url = URL.createObjectURL(file)

wavesurfer.load(url)

wavesurfer.on('ready', function(){

document.getElementById("audio").addEventListener("change",function(){
const file=this.files[0]
if(file){
document.getElementById("file-name").innerText=file.name
}
})

})

function exportTrim(){

let start = parseFloat(document.getElementById("startTime").value)
let end = parseFloat(document.getElementById("endTime").value)

const audioBuffer = wavesurfer.backend.buffer
const sampleRate = audioBuffer.sampleRate

const newBuffer = wavesurfer.backend.ac.createBuffer(
audioBuffer.numberOfChannels,
(end-start)*sampleRate,
sampleRate
)

for(let channel=0; channel<audioBuffer.numberOfChannels; channel++){

const oldData = audioBuffer.getChannelData(channel)
const newData = newBuffer.getChannelData(channel)

for(let i=0; i<newData.length; i++){
newData[i] = oldData[i + start*sampleRate]
}

}

const offlineContext = new OfflineAudioContext(
newBuffer.numberOfChannels,
newBuffer.length,
sampleRate
)

const source = offlineContext.createBufferSource()
source.buffer = newBuffer
source.connect(offlineContext.destination)
source.start()

offlineContext.startRendering().then(function(renderedBuffer){

let wav = bufferToWave(renderedBuffer, renderedBuffer.length)
let blob = new Blob([wav], {type:'audio/wav'})

let url = URL.createObjectURL(blob)

let a = document.createElement("a")
a.href = url
a.download = "trimmed_audio.wav"
a.click()

})

}

function bufferToWave(abuffer, len){

let numOfChan = abuffer.numberOfChannels
let length = len * numOfChan * 2 + 44
let buffer = new ArrayBuffer(length)
let view = new DataView(buffer)
let channels = [], i, sample
let offset = 0
let pos = 0

function setUint16(data){ view.setUint16(pos,data,true); pos+=2 }
function setUint32(data){ view.setUint32(pos,data,true); pos+=4 }

setUint32(0x46464952)
setUint32(length-8)
setUint32(0x45564157)

setUint32(0x20746d66)
setUint32(16)
setUint16(1)
setUint16(numOfChan)
setUint32(abuffer.sampleRate)
setUint32(abuffer.sampleRate * 2 * numOfChan)
setUint16(numOfChan * 2)
setUint16(16)

setUint32(0x61746164)
setUint32(length - pos - 4)

for(i=0;i<abuffer.numberOfChannels;i++)
channels.push(abuffer.getChannelData(i))

while(pos < length){
for(i=0;i<numOfChan;i++){
sample = Math.max(-1,Math.min(1,channels[i][offset]))
sample = (0.5 + sample<0 ? sample*32768 : sample*32767)|0
view.setInt16(pos,sample,true)
pos+=2
}
offset++
}

return buffer

}

</script>
