<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Audio Speed Changer - FastTools</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/lamejs@1.2.0/lame.min.js"></script>

<style>

body{
background:#e6e7ea;
font-family:Arial;
}

.tool-box{
width:600px;
margin:80px auto;
background:#071428;
padding:40px;
border-radius:12px;
color:white;
}

.controls{
margin-top:30px;
display:flex;
align-items:center;
gap:15px;
}

button{
background:#3a78ff;
border:none;
color:white;
padding:10px 18px;
border-radius:6px;
cursor:pointer;
}

input[type="range"]{
width:200px;
}

audio{
margin-top:20px;
width:100%;
}

</style>
<link rel="icon" type="image/svg+xml" href="favicon.svg">

</head>

<body>

<header class="site-header">

<a href="/tools-site/index.html" class="logo">
<img src="/tools-site/fasttools-logo.png.png" alt="FastTools">
</a>

<nav class="nav-menu">
<a href="/tools-site/index.html">Home</a>
<a href="/tools-site/tools.html">Tools</a>
<a href="/tools-site/about.html">About</a>
<a href="/tools-site/contact.html">Contact</a>
</nav>

</header>

<div class="tool-box">

<h2>Audio Speed Changer</h2>

<input type="file" id="audioFile" accept="audio/*">

<audio id="audioPreview" controls></audio>

<div class="controls">

Speed
<input type="range" id="speedSlider" min="0.5" max="2" step="0.1" value="1">

<span id="speedValue">1x</span>

<button onclick="exportAudio()">Export</button>

</div>

</div>

<script>

let audioContext
let audioBuffer
let currentFile

const audioFile = document.getElementById("audioFile")
const preview = document.getElementById("audioPreview")
const slider = document.getElementById("speedSlider")
const speedValue = document.getElementById("speedValue")

slider.addEventListener("input",function(){

speedValue.innerText = slider.value + "x"

preview.playbackRate = slider.value

})

audioFile.addEventListener("change", async function(){

currentFile = this.files[0]

if(!currentFile) return

preview.src = URL.createObjectURL(currentFile)

audioContext = new AudioContext()

const arrayBuffer = await currentFile.arrayBuffer()

audioBuffer = await audioContext.decodeAudioData(arrayBuffer)

})

async function exportAudio(){

if(!audioBuffer) return

const speed = parseFloat(slider.value)

const offline = new OfflineAudioContext(
audioBuffer.numberOfChannels,
audioBuffer.length / speed,
audioBuffer.sampleRate
)

const source = offline.createBufferSource()

source.buffer = audioBuffer
source.playbackRate.value = speed

source.connect(offline.destination)

source.start()

const renderedBuffer = await offline.startRendering()

const samples = renderedBuffer.getChannelData(0)

const mp3encoder = new lamejs.Mp3Encoder(
1,
renderedBuffer.sampleRate,
192
)

const sampleBlockSize = 1152
let mp3Data = []

for(let i=0;i<samples.length;i+=sampleBlockSize){

let chunk = samples.subarray(i,i+sampleBlockSize)

let int16 = new Int16Array(chunk.length)

for(let j=0;j<chunk.length;j++){
int16[j] = chunk[j] * 32767
}

let mp3buf = mp3encoder.encodeBuffer(int16)

if(mp3buf.length>0){
mp3Data.push(mp3buf)
}

}

let mp3buf = mp3encoder.flush()

if(mp3buf.length>0){
mp3Data.push(mp3buf)
}

const blob = new Blob(mp3Data,{type:'audio/mp3'})

const url = URL.createObjectURL(blob)

const a = document.createElement("a")
a.href = url
a.download = "speed_changed.mp3"
a.click()

}

</script>

</body>
</html>
