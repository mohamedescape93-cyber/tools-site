<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>MP3 Cutter - FastTools</title>

<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="/tools-site/style.css">

<script src="https://unpkg.com/wavesurfer.js@7"></script>

<style>

#waveform{
width:100%;
height:220px;
background:#f1f5f9;
border-radius:8px;
margin-top:25px;
}

.editor{
max-width:1000px;
margin:40px auto;
text-align:center;
}

.controls{
margin-top:25px;
display:flex;
flex-direction:column;
align-items:center;
gap:15px;
}

button{
padding:12px 24px;
border:none;
background:#2563eb;
color:white;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#1d4ed8;
}

</style>

</head>

<body>

<header class="site-header">
<a href="/tools-site/index.html" class="logo">
<img src="/tools-site/fasttools-logo.png.png">
</a>
</header>


<div class="editor">

<h1>MP3 Cutter</h1>

<input type="file" id="audio" accept="audio/*">

<div id="waveform"></div>

<div class="controls">
<button id="play">Play</button>
</div>

</div>


<script>

let wavesurfer;

document.getElementById("audio").addEventListener("change", function(e){

const file = e.target.files[0];
if(!file) return;

if(wavesurfer){
wavesurfer.destroy();
}

wavesurfer = WaveSurfer.create({
container: "#waveform",
waveColor: "#94a3b8",
progressColor: "#2563eb",
cursorColor: "#2563eb",
height: 180,
normalize: true,
minPxPerSec: 40,
interact: true,
responsive: false
});
wavesurfer.loadBlob(file);

});


document.getElementById("play").onclick = function(){

if(!wavesurfer) return;

wavesurfer.playPause();

this.innerText = wavesurfer.isPlaying() ? "Pause" : "Play";

};

</script>

</body>
</html>
