<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>MP3 Cutter - FastTools</title>

<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="/tools-site/style.css">

<script src="https://unpkg.com/wavesurfer.js@6"></script>
<script src="https://unpkg.com/wavesurfer.js@6/dist/plugin/wavesurfer.regions.min.js"></script>
<script src="https://unpkg.com/wavesurfer.js@6/dist/plugin/wavesurfer.timeline.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/lamejs@1.2.0/lame.min.js"></script>

<style>

#waveform{
width:100%;
height:220px;
background:#f1f5f9;
border-radius:8px;
margin-top:25px;
}

#waveform canvas{
width:100% !important;
height:220px !important;
}

.editor{
display:grid;
grid-template-columns:1fr 260px;
gap:40px;
margin-top:30px;
}

.editor-controls{
background:#f8fafc;
padding:25px;
border-radius:10px;
display:flex;
flex-direction:column;
gap:20px;
align-items:center;
}

.editor-controls button{
width:200px;
}

.zoom input{
width:200px;
}

#loader{
width:100%;
height:6px;
background:#e2e8f0;
border-radius:4px;
margin-top:15px;
overflow:hidden;
display:none;
}

#bar{
height:100%;
width:0%;
background:#2563eb;
transition:width 0.3s;
}

</style>

</head>

<body>

<header class="site-header">

<a href="/tools-site/index.html" class="logo">
<img src="/tools-site/fasttools-logo.png.png">
</a>

<nav class="nav-menu">
<a href="/tools-site/index.html">Home</a>
<a href="/tools-site/tools.html">Tools</a>
<a href="/tools-site/about.html">About</a>
<a href="/tools-site/contact.html">Contact</a>
</nav>

</header>


<div class="tool-container">

<h1>MP3 Cutter</h1>

<label class="upload-btn">
Upload MP3
<input type="file" id="audio" accept="audio/*">
</label>

<div id="loader"><div id="bar"></div></div>

<div class="editor">

<div>

<div id="waveform"></div>
<div id="timeline"></div>

</div>

<div class="editor-controls">

<button id="play">Play</button>

<div>
<span id="start">0:00</span> —
<span id="end">0:00</span>
</div>

<div class="zoom">
Zoom
<br>
<input type="range" id="zoom" min="20" max="500" value="80">
</div>

<button id="export">Export MP3</button>

</div>

</div>

</div>


<footer class="site-footer">
© 2026 FastTools
</footer>



<script>

window.addEventListener("DOMContentLoaded", function(){

const wavesurfer = WaveSurfer.create({
container:"#waveform",
waveColor:"#94a3b8",
progressColor:"#2563eb",
cursorColor:"#2563eb",
height:220,
plugins:[
WaveSurfer.regions.create(),
WaveSurfer.timeline.create({
container:"#timeline"
})
]
})

let region

function formatTime(sec){
sec=Math.floor(sec)
let m=Math.floor(sec/60)
let s=sec%60
if(s<10)s="0"+s
return m+":"+s
}

document.getElementById("audio").addEventListener("change",function(e){

const file=e.target.files[0]
if(!file)return

document.getElementById("loader").style.display="block"
document.getElementById("bar").style.width="30%"

wavesurfer.loadBlob(file)

})

wavesurfer.on("ready",()=>{

document.getElementById("bar").style.width="100%"

setTimeout(()=>{
document.getElementById("loader").style.display="none"
},300)

const duration=wavesurfer.getDuration()

region = wavesurfer.addRegion({
start:duration*0.2,
end:duration*0.6,
color:'rgba(255,200,0,0.35)',
drag:true,
resize:true
})

updateInputs()

region.on('update-end',updateInputs)

})

function updateInputs(){
document.getElementById("start").innerText=formatTime(region.start)
document.getElementById("end").innerText=formatTime(region.end)
}

document.getElementById("play").onclick=function(){
wavesurfer.playPause()
this.innerText=wavesurfer.isPlaying()?"Pause":"Play"
}

document.getElementById("zoom").oninput=function(){
wavesurfer.zoom(this.value)
}

})

</script>

</body>
</html>
