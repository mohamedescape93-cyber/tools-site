<script>

const wavesurfer = WaveSurfer.create({
container:"#waveform",
waveColor:"#94a3b8",
progressColor:"#2563eb",
cursorColor:"#2563eb",
height:200,
plugins:[
WaveSurfer.regions.create(),
WaveSurfer.timeline.create({
container:"#timeline"
})
]
})

let region

function formatTime(sec){
sec=Math.floor(sec)
let m=Math.floor(sec/60)
let s=sec%60
if(s<10)s="0"+s
return m+":"+s
}

document.getElementById("audio").addEventListener("change",function(e){

const file=e.target.files[0]

if(!file) return

document.getElementById("progress").innerText="Loading audio..."

const reader=new FileReader()

reader.onload=function(event){

wavesurfer.loadBlob(new Blob([event.target.result]))

}

reader.readAsArrayBuffer(file)

})

wavesurfer.on("ready",function(){

document.getElementById("progress").innerText=""

const duration = wavesurfer.getDuration()

region = wavesurfer.addRegion({
start:duration*0.3,
end:duration*0.6,
color:'rgba(255,212,59,0.15)',
drag:true,
resize:true
})

updateInputs()

region.on('update', updateInputs)
})
wavesurfer.on('finish', () => {
  wavesurfer.play(region.start, region.end)
})
function updateInputs(){

document.getElementById("start").innerText=formatTime(region.start)
document.getElementById("end").innerText=formatTime(region.end)

}

document.getElementById("play").onclick=function(){

wavesurfer.playPause()

this.innerText = wavesurfer.isPlaying() ? "Pause" : "Play"

}

document.getElementById("zoom").oninput=function(){

wavesurfer.zoom(Number(this.value))

}

document.getElementById("export").onclick=function(){

const start=region.start
const end=region.end

const buffer=wavesurfer.backend.buffer

const sampleRate=buffer.sampleRate

const startOffset=Math.floor(start*sampleRate)
const endOffset=Math.floor(end*sampleRate)

const samples=buffer.getChannelData(0).slice(startOffset,endOffset)

const mp3encoder=new lamejs.Mp3Encoder(1,sampleRate,192)

const sampleBlockSize=1152

let mp3Data=[]

for(let i=0;i<samples.length;i+=sampleBlockSize){

let chunk=samples.subarray(i,i+sampleBlockSize)

let int16=new Int16Array(chunk.length)

for(let j=0;j<chunk.length;j++){
int16[j]=chunk[j]*32767
}

let mp3buf=mp3encoder.encodeBuffer(int16)

if(mp3buf.length>0) mp3Data.push(mp3buf)

}

let mp3buf=mp3encoder.flush()

if(mp3buf.length>0) mp3Data.push(mp3buf)

const blob=new Blob(mp3Data,{type:'audio/mp3'})

const url=URL.createObjectURL(blob)

const a=document.createElement("a")

a.href=url
a.download="trimmed.mp3"

a.click()

}

</script>
