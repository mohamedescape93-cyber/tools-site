<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Split PDF - FastTools</title>

<meta name="description" content="Extract pages from a PDF and download them as a new PDF file.">

<link rel="stylesheet" href="style.css">
<link rel="icon" type="image/svg+xml" href="favicon.svg">

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js";
</script>

<style>

.drop-area{
border:2px dashed #cbd5e1;
padding:40px;
border-radius:10px;
background:#f8fafc;
margin-top:20px;
cursor:pointer;
}

.preview-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:15px;
margin-top:25px;
}

.preview-item{
background:#f8fafc;
border:1px solid #cbd5e1;
padding:10px;
border-radius:8px;
text-align:center;
}

.preview-item canvas{
width:100%;
border-radius:6px;
}

.spinner{
width:40px;
height:40px;
border:4px solid #cbd5e1;
border-top:4px solid #2563eb;
border-radius:50%;
animation:spin 1s linear infinite;
margin:15px auto;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

</style>

</head>

<body>

<header class="site-header">

<a href="index.html" class="logo">
<img src="fasttools-logo.png.png" alt="FastTools">
</a>

<nav class="nav-menu">
<a href="index.html">Home</a>
<a href="index.html#tools">Tools</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
</nav>

</header>


<div class="tool-container">

<h1>Split PDF</h1>

<p>Upload a PDF, preview its pages, and select the pages you want to extract.</p>

<div id="drop-area" class="drop-area">

<p>Drag PDF here or click to upload</p>

<input type="file" id="file-input" accept=".pdf" hidden>

</div>

<div id="preview" class="preview-grid"></div>

<button class="main-button" id="splitBtn">
Download Selected Pages
</button>

<div id="loader" style="display:none">

<p>Preparing PDF...</p>

<div class="spinner"></div>

</div>

</div>


<div class="more-tools">

<h3>More Tools</h3>

<a href="merge-pdf.html">Merge PDF</a>
<a href="jpg-to-pdf.html">JPG to PDF</a>
<a href="pdf-to-word.html">PDF to Word</a>
<a href="compress-image.html">Image Compressor</a>

</div>


<footer class="site-footer">
<p>
© 2026 FastTools • Free Online Tools
<br>
<a href="privacy.html">Privacy</a> •
<a href="terms.html">Terms</a> •
<a href="contact.html">Contact</a>
</p>
</footer>


<script>

const dropArea = document.getElementById("drop-area");
const fileInput = document.getElementById("file-input");
const preview = document.getElementById("preview");
const splitBtn = document.getElementById("splitBtn");
const loader = document.getElementById("loader");

let pdfFile = null;

dropArea.onclick = () => fileInput.click();

dropArea.addEventListener("dragover", e=>{
e.preventDefault();
});

dropArea.addEventListener("drop", e=>{
e.preventDefault();
handleFile(e.dataTransfer.files[0]);
});

fileInput.addEventListener("change", ()=>{
handleFile(fileInput.files[0]);
});


async function handleFile(file){

if(!file) return;

pdfFile = file;

preview.innerHTML = "";

const buffer = await file.arrayBuffer();

const pdf = await pdfjsLib.getDocument({data:buffer}).promise;

for(let i=1;i<=pdf.numPages;i++){

const page = await pdf.getPage(i);

const viewport = page.getViewport({scale:0.5});

const canvas = document.createElement("canvas");

const ctx = canvas.getContext("2d");

canvas.width = viewport.width;
canvas.height = viewport.height;

await page.render({
canvasContext:ctx,
viewport:viewport
}).promise;

const box = document.createElement("div");

box.className="preview-item";

box.appendChild(canvas);

const label = document.createElement("div");
label.innerText = "Page " + i;

const checkbox = document.createElement("input");
checkbox.type="checkbox";
checkbox.checked=true;

box.appendChild(label);
box.appendChild(checkbox);

preview.appendChild(box);

}

}


splitBtn.addEventListener("click", splitPDF);


async function splitPDF(){

if(!pdfFile){
alert("Upload a PDF first");
return;
}

loader.style.display="block";

const bytes = await pdfFile.arrayBuffer();

const pdfDoc = await PDFLib.PDFDocument.load(bytes);

const newPDF = await PDFLib.PDFDocument.create();

const items = document.querySelectorAll(".preview-item");

for(let i=0;i<items.length;i++){

const checked = items[i].querySelector("input").checked;

if(!checked) continue;

const [page] = await newPDF.copyPages(pdfDoc,[i]);

newPDF.addPage(page);

}

const newBytes = await newPDF.save();

const blob = new Blob([newBytes],{type:"application/pdf"});

const url = URL.createObjectURL(blob);

const link = document.createElement("a");

link.href = url;
link.download = "split.pdf";

document.body.appendChild(link);

link.click();

document.body.removeChild(link);

loader.style.display="none";

}

</script>

</body>
</html>
