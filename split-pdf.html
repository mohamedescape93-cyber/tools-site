<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Split PDF - FastTools</title>

<meta name="description" content="Extract pages from a PDF and download them as a new PDF file.">

<link rel="stylesheet" href="style.css">
<link rel="icon" type="image/svg+xml" href="favicon.svg">

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js";
</script>
<style>

.preview-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:15px;
margin-top:25px;
}

.preview-item{
background:#f8fafc;
border:1px solid #cbd5e1;
padding:10px;
border-radius:8px;
text-align:center;
}

.preview-item canvas{
max-width:100%;
border-radius:6px;
}

.drop-area{
border:2px dashed #cbd5e1;
padding:40px;
border-radius:10px;
background:#f8fafc;
margin-top:20px;
cursor:pointer;
}

</style>

</head>

<body>

<header class="site-header">

<a href="index.html" class="logo">
<img src="fasttools-logo.png.png" alt="FastTools">
</a>

<nav class="nav-menu">
<a href="index.html">Home</a>
<a href="index.html#tools">Tools</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
</nav>

</header>


<div class="tool-container">

<h1>Split PDF</h1>

<p>Upload a PDF, preview its pages, and select the pages you want to extract.</p>

<div class="drop-area" id="drop-area">

<p>Drag PDF here or click to upload</p>

<input type="file" id="file-input" accept=".pdf" hidden>

</div>

<div class="preview-grid" id="preview"></div>

<button class="main-button" onclick="splitPDF()">Download Selected Pages</button>

<a id="downloadLink"></a>

</div>


<div class="more-tools">

<h3>More Tools</h3>

<a href="merge-pdf.html">Merge PDF</a>
<a href="jpg-to-pdf.html">JPG to PDF</a>
<a href="pdf-to-word.html">PDF to Word</a>
<a href="compress-image.html">Image Compressor</a>

</div>


<footer class="site-footer">
<p>
© 2026 FastTools • Free Online Tools
<br>
<a href="privacy.html">Privacy</a> •
<a href="terms.html">Terms</a> •
<a href="contact.html">Contact</a>
</p>
</footer>


<script>

const dropArea = document.getElementById("drop-area");
const fileInput = document.getElementById("file-input");
const preview = document.getElementById("preview");

let pdfBytes;

dropArea.onclick = () => fileInput.click();

dropArea.addEventListener("dragover", e=>{
e.preventDefault();
});

dropArea.addEventListener("drop", e=>{
e.preventDefault();
loadPDF(e.dataTransfer.files[0]);
});

fileInput.addEventListener("change", ()=>{
loadPDF(fileInput.files[0]);
});


async function loadPDF(file){

pdfBytes = await file.arrayBuffer();

preview.innerHTML="";

const pdf = await pdfjsLib.getDocument({data:pdfBytes}).promise;

for(let i=1;i<=pdf.numPages;i++){

const page = await pdf.getPage(i);

const viewport = page.getViewport({scale:0.4});

const canvas = document.createElement("canvas");

const context = canvas.getContext("2d");

canvas.height = viewport.height;

canvas.width = viewport.width;

await page.render({
canvasContext:context,
viewport:viewport
}).promise;

const div = document.createElement("div");

div.className="preview-item";

div.innerHTML=`
`;

div.appendChild(canvas);

const checkbox = document.createElement("input");

checkbox.type="checkbox";
checkbox.checked=true;

div.appendChild(document.createElement("br"));
div.appendChild(checkbox);

preview.appendChild(div);

}

}


async function splitPDF(){

const { PDFDocument } = PDFLib;

const originalPDF = await PDFDocument.load(pdfBytes.slice(0));

const newPDF = await PDFDocument.create();

const items = document.querySelectorAll(".preview-item");

for(let i=0;i<items.length;i++){

const checked = items[i].querySelector("input").checked;

if(!checked) continue;

const [page] = await newPDF.copyPages(originalPDF,[i]);

newPDF.addPage(page);

}

const newBytes = await newPDF.save();

const blob = new Blob([newBytes],{type:"application/pdf"});

const link = document.getElementById("downloadLink");

link.href = URL.createObjectURL(blob);

link.download = "split.pdf";

link.innerText = "Download PDF";

link.className = "main-button";

}

</script>

</body>
</html>
