<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
<title>Image Converter - FastTools</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>

body

  {
font-family:Arial;
background:#f4f6f9;
text-align:center;
}

#drop-area{
border:2px dashed #2c3e50;
padding:40px;
width:60%;
margin:auto;
background:white;
cursor:pointer;
}

#preview img{
width:100px;
margin:10px;
}

button{
padding:10px 20px;
margin-top:20px;
cursor:pointer;
}

#downloadMenu{
display:none;
position:relative;
margin-top:20px;
}

#menu{
display:none;
background:white;
border:1px solid #ccc;
width:200px;
margin:auto;
}

#menu button{
display:block;
width:100%;
border:none;
background:white;
padding:10px;
}

#menu button:hover{
background:#eee;
}

/* TOAST */

#toast{
visibility:hidden;
min-width:250px;
background:#333;
color:#fff;
text-align:center;
border-radius:6px;
padding:12px;
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
z-index:999;
}

#toast.show{
visibility:visible;
animation:fadein 0.3s, fadeout 0.3s 2.5s;
}

@keyframes fadein{
from{bottom:10px;opacity:0;}
to{bottom:30px;opacity:1;}
}

@keyframes fadeout{
from{bottom:30px;opacity:1;}
to{bottom:10px;opacity:0;}
}

</style>

</head>

<body>

<h1>Image Converter</h1>

<div id="drop-area">
<p>Drag & Drop Images Here or Click to Upload</p>
<input type="file" id="upload" multiple accept="image/*" hidden>
</div>

<br>

<select id="format">
<option value="image/jpeg">Convert to JPG</option>
<option value="image/png">Convert to PNG</option>
</select>

<br>

<div id="preview"></div>

<button onclick="convertImage()">Convert</button>

<br><br>

<div id="downloadMenu">

<button onclick="toggleMenu()">Download ▼</button>

<div id="menu">
<button onclick="downloadImages()">Download Images Individually</button>
<button onclick="downloadZip()">Download as ZIP</button>
</div>

</div>

<div id="toast">Please upload an image first</div>

<script>

let dropArea=document.getElementById("drop-area");
let fileInput=document.getElementById("upload");
let preview=document.getElementById("preview");

let convertedImages=[];

dropArea.onclick=()=>fileInput.click();

dropArea.addEventListener("dragover",e=>{
e.preventDefault();
});

dropArea.addEventListener("drop",e=>{
e.preventDefault();
fileInput.files=e.dataTransfer.files;
showPreview();
});

fileInput.addEventListener("change",showPreview);

function showPreview(){

preview.innerHTML="";

let files=fileInput.files;

for(let i=0;i<files.length;i++){

let img=document.createElement("img");
img.src=URL.createObjectURL(files[i]);
preview.appendChild(img);

}

}

function showToast(){

let toast=document.getElementById("toast");

toast.className="show";

setTimeout(()=>{
toast.className=toast.className.replace("show","");
},3000);

}

function convertImage(){

let files=fileInput.files;

if(!files || files.length===0){
showToast();
return;
}

convertedImages=[];

let format=document.getElementById("format").value;

for(let i=0;i<files.length;i++){

let file=files[i];
let img=new Image();
let reader=new FileReader();

reader.onload=function(e){

img.src=e.target.result;

img.onload=function(){

let canvas=document.createElement("canvas");
canvas.width=img.width;
canvas.height=img.height;

let ctx=canvas.getContext("2d");
ctx.drawImage(img,0,0);

let converted=canvas.toDataURL(format);

let extension=format==="image/jpeg"?".jpg":".png";

convertedImages.push({
data:converted,
name:"converted_"+(i+1)+extension
});

}

}

reader.readAsDataURL(file);

}

document.getElementById("downloadMenu").style.display="block";

}

function toggleMenu(){

let menu=document.getElementById("menu");

menu.style.display = menu.style.display==="block" ? "none" : "block";

}

function downloadImages(){

for(let i=0;i<convertedImages.length;i++){

let link=document.createElement("a");
link.href=convertedImages[i].data;
link.download=convertedImages[i].name;
link.click();

}

}

function downloadZip(){

let zip = new JSZip();

for(let i=0;i<convertedImages.length;i++){

let base64 = convertedImages[i].data.split(',')[1];

zip.file(convertedImages[i].name, base64, {base64:true});

}

zip.generateAsync({type:"blob"}).then(function(content){

let link = document.createElement("a");
link.href = URL.createObjectURL(content);
link.download = "converted_images.zip";
link.click();

});

}

</script>

</body>
</html>
